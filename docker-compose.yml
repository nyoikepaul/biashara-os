version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: biashara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: biashara
      POSTGRES_PASSWORD: biashara123
      POSTGRES_DB: biashara_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biashara -d biashara_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biashara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://biashara:biashara123@postgres:5432/biashara_os
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    command: sh -c "npx prisma db push --accept-data-loss && node src/app.js"

volumes:
  postgres_data:
